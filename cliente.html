<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agendamento - Viking Estúdio</title>

<style>
body {
font-family: Arial, sans-serif;
background:#111;
color:white;
padding:20px;
}

.container {
max-width:400px;
margin:auto;
background:#222;
padding:25px;
border-radius:15px;
}

h1 {
text-align:center;
color:#d4af37;
}

input, select, button {
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:none;
}

button {
background:#d4af37;
font-weight:bold;
cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<h1>⚔️ Viking Estúdio</h1>

<p>📅 Agende seu horário</p>


<label>Serviço:</label>

<select id="servico" onchange="tempoServico()">

<option value="Corte + Barba" data-tempo="45">💈 Corte + Barba - R$38 (45 min)</option>
<option value="Corte + Hidratação" data-tempo="35">💧 Corte + Hidratação - R$25 (35 min)</option>
<option value="Corte + Sobrancelha" data-tempo="45">👁️ Corte + Sobrancelha - R$25 (45 min)</option>
<option value="Corte Masculino" data-tempo="30">✂️ Corte Masculino - R$20 (30 min)</option>
<option value="Barba" data-tempo="15">🧔 Barba - R$20 (15 min)</option>
<option value="Hidratação" data-tempo="5">✨ Hidratação - R$10 (5 min)</option>
<option value="Sobrancelha" data-tempo="5">👁️ Sobrancelha - R$10 (5 min)</option>
<option value="Pezinho" data-tempo="5">✂️ Pezinho - R$10 (5 min)</option>
<option value="Pigmentação Perfil" data-tempo="15">🎨 Pigmentação Perfil - R$10 (15 min)</option>
<option value="Pigmentação Cabelo" data-tempo="15">🔥 Pigmentação Cabelo - R$20 (15 min)</option>
<option value="Epilação Nasal" data-tempo="10">👃 Epilação Nasal - R$10 (10 min)</option>
<option value="Limpeza de Pele" data-tempo="15">🧴 Limpeza de Pele - R$15 (15 min)</option>

</select>


<input type="hidden" id="duracao" value="45">


<label>Data:</label>
<input type="date" id="data">


<label>Horário:</label>

<select id="hora">
<option>08:00</option>
<option>09:00</option>
<option>10:00</option>
<option>11:00</option>
<option>12:00</option>
<option>13:00</option>
<option>14:00</option>
<option>15:00</option>
<option>16:00</option>
<option>17:00</option>
<option>18:00</option>
<option>19:00</option>
</select>


<input type="text" id="nome" placeholder="Seu nome">

<input type="tel" id="telefone" placeholder="Seu WhatsApp">


<button onclick="agendar()">
✅ Confirmar Agendamento
</button>

</div>


<script>

const urlPlanilha = "https://script.google.com/macros/s/AKfycbywAMjTC3SSwvwZlDERz69s_NWTJLNEvkp80tGzCx5guJA1zfQppxPEXFQEKrBZ3jXZ/exec";


function tempoServico(){

let servico = document.getElementById("servico");

let tempo = servico.options[servico.selectedIndex].dataset.tempo;

document.getElementById("duracao").value = tempo;

}



function agendar(){

let dados = {

nome: document.getElementById("nome").value,

telefone: document.getElementById("telefone").value,

servico: document.getElementById("servico").value,

data: document.getElementById("data").value,

hora: document.getElementById("hora").value,

duracao: document.getElementById("duracao").value + " minutos"

};


fetch(urlPlanilha, {

method:"POST",

body:JSON.stringify(dados)

});


let mensagem = 
`Olá, quero agendar no Viking Estúdio.%0A%0A`+
`Serviço: ${dados.servico}%0A`+
`Data: ${dados.data}%0A`+
`Horário: ${dados.hora}%0A`+
`Nome: ${dados.nome}`;


window.open("https://wa.me/5575981478061?text="+mensagem);

}

</script>

</body>
</html>
